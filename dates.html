<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --text-main: #1c1d1f;
            --text-muted: #6a6f73;
            --border: #d1d7dc;
            --bg-light: #f7f9fa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans Sinhala', sans-serif;
            background-color: transparent;
            color: var(--text-main);
            padding: 10px;
        }

        .astro-card {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 500px;
            margin: 0 auto;
        }

        .selector-box {
            padding: 15px;
            background: var(--bg-light);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        select {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-family: inherit;
            font-weight: 700;
            color: var(--text-main);
            background: white;
            outline: none;
            cursor: pointer;
            font-size: 14px;
        }

        .image-container {
            width: 100%;
            height: 200px;
            background: #f0f2f5;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-pane {
            padding: 20px;
        }

        .day-title {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 10px;
            line-height: 1.3;
            color: var(--text-main);
        }

        .day-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .today-tag {
            margin-top: 15px;
            color: #10b981;
            font-size: 12px;
            font-weight: 700;
            display: none;
        }
    </style>
</head>

    function updateDisplay() {
        const m = document.getElementById('monthSelect').value;
        const d = document.getElementById('daySelect').value;
        const key = m + "-" + d;
        
        const today = new Date();
        const isToday = ((today.getMonth() + 1) == m && today.getDate() == d);
        
        document.getElementById('todayIndicator').style.display = isToday ? 'block' : 'none';

        const data = dataStore[key];
        if (data) {
            const parts = data[0].split('/');
            document.getElementById('mainTitle').innerText = parts[0].trim();
            document.getElementById('mainDesc').innerText = parts[1] ? parts[1].trim() : "මෙම දිනය ශ්‍රී ලංකාවට සහ ලෝකයට වැදගත් සුවිශේෂී දිනයකි.";
            document.getElementById('displayImg').src = data[1];
        } else {
            document.getElementById('mainTitle').innerText = "සාමාන්‍ය දිනයක්";
            document.getElementById('mainDesc').innerText = "විශේෂිත ගෝලීය සැමරුමක් වාර්තා වී නැත. විභාග සඳහා සූදානම් වීමට මෙය කදිම දිනයකි.";
            document.getElementById('displayImg').src = imgs.generic;
        }
    }

    window.onload = function() {
        const now = new Date();
        document.getElementById('monthSelect').value = now.getMonth() + 1;
        document.getElementById('daySelect').value = now.getDate();
        updateDisplay();
    };
</script>
