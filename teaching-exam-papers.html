<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Lanka Teaching Exam Papers 2026 | AstroQuiz</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 1. Animated Gradient Background 🌈 */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', 'Noto Sans Sinhala', sans-serif;
            background: linear-gradient(-45deg, #020617, #0f172a, #1e1b4b, #020617);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite; /* පසුබිම සෙමින් චලනය වීම */
            color: #ffffff;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. Glassmorphism Card ✨ */
        .container {
            max-width: 600px;
            padding: 50px 30px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); /* වීදුරුවක් වැනි පෙනුම */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #0ea5e9, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(14, 165, 233, 0.3);
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 40px;
            line-height: 1.8;
        }

        /* 3. Glowing Pulse Button 🚀 */
        .start-btn {
            display: inline-block;
            padding: 18px 45px;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            background: linear-gradient(90deg, #0ea5e9, #2563eb);
            border-radius: 15px;
            transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(14, 165, 233, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(14, 165, 233, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(14, 165, 233, 0.4); }
        }

        .start-btn:hover {
            transform: translateY(-5px);
            filter: brightness(1.2);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Teaching Exam 2026</h1>
        <p>ගුරු විභාගය සඳහා විශේෂයෙන්ම සකස් කළ අනුමාන ප්‍රශ්න පත්‍ර සහ පිළිතුරු දැන්ම ලබාගන්න. ඔබේ දැනුම මැන බැලීමට පහත බොත්තම ක්ලික් කරන්න.</p>
        
        <a href="https://ruwan-dev.github.io/gk_quiz_app/" class="start-btn">දැන්ම ආරම්භ කරන්න</a>
        
        <div class="footer">
            © 2026 slxamguide.online | OrbitView Innovations
        </div>
    </div>

</body>
</html>
